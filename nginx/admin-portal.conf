# ──────────────────────────────────────────────────────────────────────────────
# Admin Portal – Nginx site configuration
# Serves the React SPA + proxies /api/* to the Node/PM2 server on :5001
#
# Accessible on port 8080 until a subdomain is configured.
# Once you have a domain, change this to a normal port-80/443 server block
# with server_name admin.yourdomain.com and run:
#   sudo certbot --nginx -d admin.yourdomain.com
#
# Deploy:
#   sudo cp nginx/admin-portal.conf /etc/nginx/conf.d/admin-portal.conf
#   sudo nginx -t && sudo systemctl reload nginx
# ──────────────────────────────────────────────────────────────────────────────

upstream admin_api {
    server 127.0.0.1:5001;
    keepalive 16;
}

server {
    listen 8080;
    listen [::]:8080;

    server_name _;

    access_log /var/log/nginx/admin-portal-access.log;
    error_log  /var/log/nginx/admin-portal-error.log warn;

    client_max_body_size 10M;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options          "DENY"                            always;
    add_header X-Content-Type-Options   "nosniff"                         always;
    add_header X-XSS-Protection         "1; mode=block"                   always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      expired no-cache no-store private auth;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml image/svg+xml;

    # ── React SPA root ────────────────────────────────────────────────────────
    root  /home/ec2-user/splitsecond-pos/apps/admin-portal/client/dist;
    index index.html;

    # Vite hashed bundles — cache forever
    location ~* \.(js|css)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # Other static assets
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires    30d;
        add_header Cache-Control "public";
        try_files  $uri =404;
    }

    # ── API – proxy to PM2 server ─────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://admin_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    30s;
        proxy_connect_timeout  5s;
        proxy_send_timeout    30s;

        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA catch-all
    location / {
        try_files $uri $uri/ /index.html;
    }
}
