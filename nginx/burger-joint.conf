# ──────────────────────────────────────────────────────────────────────────────
# Burger Joint POS – Nginx site configuration
#
# Install:
#   sudo cp nginx/burger-joint.conf /etc/nginx/sites-available/burger-joint
#   sudo ln -sf /etc/nginx/sites-available/burger-joint \
#               /etc/nginx/sites-enabled/burger-joint
#   sudo rm -f  /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# After install, add HTTPS with:
#   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
# ──────────────────────────────────────────────────────────────────────────────

# Upstream pool – PM2 cluster listens on 5000
upstream pos_api {
    server 127.0.0.1:5000;
    keepalive 32;           # reuse connections to the Node.js backend
}

# ── HTTP (port 80) ─────────────────────────────────────────────────────────────
# Certbot will convert this block to HTTPS automatically.
server {
    listen 80;
    listen [::]:80;

    # Replace with your domain or EC2 public IP.
    # Use "_" to accept any hostname (useful before DNS is configured).
    server_name _;

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/pos-access.log;
    error_log  /var/log/nginx/pos-error.log warn;

    # ── Global limits ────────────────────────────────────────────────────────
    client_max_body_size 10M;   # must match multer's fileSize limit

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options "nosniff"                       always;
    add_header X-XSS-Protection       "1; mode=block"                 always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    # Uncomment after you confirm HTTPS works:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      expired no-cache no-store private auth;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml application/atom+xml
        image/svg+xml;

    # ── Document root (React SPA build output) ────────────────────────────────
    root  /home/ubuntu/pos/client/dist;
    index index.html;

    # ── Hashed static assets (JS / CSS bundles from Vite) ─────────────────────
    # Vite includes a content hash in filenames → safe to cache forever.
    location ~* \.(js|css)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # ── Other static assets ───────────────────────────────────────────────────
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires    30d;
        add_header Cache-Control "public";
        try_files  $uri =404;
    }

    # ── User-uploaded files (served directly by Nginx, bypassing Node) ────────
    location /uploads/ {
        alias /home/ubuntu/pos/server/uploads/;
        expires    7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff";
    }

    # ── API – proxied to Node.js / PM2 cluster ────────────────────────────────
    location /api/ {
        proxy_pass         http://pos_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";       # enable keepalive
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    30s;
        proxy_connect_timeout  5s;
        proxy_send_timeout    30s;

        # Don't cache API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── SPA catch-all – every unknown path returns index.html ─────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
