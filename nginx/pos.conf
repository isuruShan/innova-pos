# ──────────────────────────────────────────────────────────────────────────────
# POS App – Nginx site configuration
# Serves the React SPA + proxies /api/* to the Node/PM2 cluster on :5000
#
# Deploy:
#   sudo cp nginx/pos.conf /etc/nginx/conf.d/pos.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# After pointing a domain to this server, add HTTPS:
#   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
# ──────────────────────────────────────────────────────────────────────────────

upstream pos_api {
    server 127.0.0.1:5000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;

    # Replace with your domain once DNS is configured.
    # Use "_" to accept any hostname (works with bare Elastic IP).
    server_name _;

    access_log /var/log/nginx/pos-access.log;
    error_log  /var/log/nginx/pos-error.log warn;

    client_max_body_size 10M;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options   "nosniff"                         always;
    add_header X-XSS-Protection         "1; mode=block"                   always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    # Uncomment after HTTPS is confirmed working:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      expired no-cache no-store private auth;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml image/svg+xml;

    # ── React SPA root ────────────────────────────────────────────────────────
    root  /home/ec2-user/splitsecond-pos/apps/pos/client/dist;
    index index.html;

    # Vite hashed bundles — cache forever
    location ~* \.(js|css)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # Other static assets
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires    30d;
        add_header Cache-Control "public";
        try_files  $uri =404;
    }

    # User-uploaded files served directly by nginx (bypasses Node.js)
    location /uploads/ {
        alias /home/ec2-user/splitsecond-pos/apps/pos/server/uploads/;
        expires    7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff";
    }

    # ── API – proxy to PM2 cluster ────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://pos_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    30s;
        proxy_connect_timeout  5s;
        proxy_send_timeout    30s;

        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA catch-all
    location / {
        try_files $uri $uri/ /index.html;
    }
}
