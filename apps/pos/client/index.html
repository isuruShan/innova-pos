<!doctype html>
<html lang="en">
  <head>
    <script>
      try {
        var __t = localStorage.getItem('pos_theme');
        document.documentElement.dataset.theme = (__t === 'light' || __t === 'dark') ? __t : 'dark';
      } catch (e) {
        document.documentElement.dataset.theme = 'dark';
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="description" content="Cafinity point of sale — runs offline-capable as an installed app." />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="icon" type="image/png" href="/logo-1.png" />
    <link rel="apple-touch-icon" href="/logo-1.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Cafinity POS</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
