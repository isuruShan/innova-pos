# Deploy to production EC2 when main is updated.
#
# Required GitHub repository secrets:
#   EC2_HOST      — public IP or hostname of the EC2 instance
#   EC2_USER      — SSH user (e.g. ec2-user on Amazon Linux)
#   EC2_SSH_KEY   — private key (PEM) for that user
#   EC2_APP_PATH  — absolute path to the git clone on the server
#                   (e.g. /home/ec2-user/InnovaSoltions/innova-pos)
#
# On the EC2 host (once):
#   - git clone with deploy access (deploy key or HTTPS token)
#   - Node 20+, pnpm (corepack), pm2 globally
#   - chmod +x scripts/deploy-production.sh
#   - optional: deploy.env at repo root for VITE_* build variables

name: Deploy production (EC2)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ec2-production
  cancel-in-progress: true

jobs:
  deploy:
    name: SSH deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Run deploy script on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 40m
          script: |
            set -euo pipefail
            APP_PATH="${{ secrets.EC2_APP_PATH }}"
            if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
              echo "EC2_APP_PATH secret is missing or not a directory: $APP_PATH" >&2
              exit 1
            fi
            cd "$APP_PATH"
            bash ./scripts/deploy-production.sh
